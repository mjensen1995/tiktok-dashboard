<!DOCTYPE html>
<html lang="da">
<head>
  <meta charset="UTF-8">
  <title>Team Stauding</title>

  <style>
    body {
      margin: 0;
      height: 100vh;
      background: black;
      color: white;
      display: flex;
      justify-content: center;
      align-items: center;
      flex-direction: column;
      font-family: Arial;
    }

    .team {
      font-size: 60px;
      font-weight: bold;
      color: red;
    }

    .title {
      font-size: 30px;
      margin-top: 10px;
    }

    .count {
      font-size: 100px;
      margin-top: 40px;
    }

    .time {
      margin-top: 10px;
      opacity: 0.7;
    }
  </style>
</head>
<body>

<div class="team">TEAM STAUDING</div>
<div class="title">TikTok Followers</div>

<div class="count" id="followers">---</div>
<div class="time" id="updated">---</div>

<script>
async function loadData() {
  try {
    const res = await fetch("https://cdn.jsdelivr.net/gh/mjensen1995/tiktok-dashboard/data.json?_=" + Date.now());
    const data = await res.json();

    document.getElementById("followers").textContent =
      Number(data.followers).toLocaleString("da-DK");

    document.getElementById("updated").textContent =
      "Opdateret: " + data.time;

  } catch (err) {
    console.error(err);
    document.getElementById("followers").textContent = "FEJL";
  }
}

loadData();
setInterval(loadData, 60000);
</script>

</body>
</html>
